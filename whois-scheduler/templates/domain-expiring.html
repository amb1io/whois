<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>O domínio {{domain}} expira hoje</title>
  </head>
  <body
    style="margin:0;padding:0;background-color:#f1f5f9;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:#0f172a;"
  >
    <table
      role="presentation"
      width="100%"
      cellspacing="0"
      cellpadding="0"
      style="background-color:#f1f5f9;padding:32px 16px;"
    >
      <tr>
        <td align="center">
          <table
            role="presentation"
            width="100%"
            cellspacing="0"
            cellpadding="0"
            style="max-width:520px;background-color:#ffffff;border:1px solid #e2e8f0;border-radius:16px;overflow:hidden;"
          >
            <tr>
              <td style="padding:32px 28px;">
                <p
                  style="margin:0 0 8px;font-size:12px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;color:#2563eb;"
                >
                  {{fromName}}
                </p>
                <h1
                  style="margin:0 0 16px;font-size:22px;font-weight:600;line-height:1.3;color:#0f172a;"
                >
                  O domínio {{domain}} expira hoje
                </h1>
                <p
                  style="margin:0 0 28px;font-size:15px;line-height:1.6;color:#475569;"
                >
                  O domínio que você está monitorando atinge a data de expiração
                  hoje. Clique no botão abaixo para ver os detalhes atualizados.
                </p>
                <a
                  href="{{buttonUrl}}"
                  style="display:inline-block;background-color:#2563eb;color:#ffffff;text-decoration:none;font-size:14px;font-weight:600;padding:12px 24px;border-radius:9999px;"
                >
                  Ver Atualização
                </a>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
